name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, Prisma, Build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: minhhong_next
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d minhhong_next"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AUTH_SECRET: ci-auth-secret-minhhong-next-change-in-production
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/minhhong_next?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/minhhong_next?schema=public
      AI_PROVIDER: 9router
      NINE_ROUTER_BASE_URL: http://127.0.0.1:20128/v1
      NINE_ROUTER_MODEL: cx/gpt-5.2
      NINE_ROUTER_API_KEY: ci-placeholder
      AI_API_KEY: ci-placeholder
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Validate Prisma schema
        run: npm run db:validate

      - name: Apply database migrations
        run: npm run db:migrate:deploy

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
