services:
  postgres:
    image: postgres:16-alpine
    container_name: minhhong-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-minhhong_next}
      POSTGRES_USER: ${POSTGRES_USER:-minhhong}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minhhong_local_dev}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - minhhong_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-minhhong} -d ${POSTGRES_DB:-minhhong_next}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  minhhong_postgres_data:
